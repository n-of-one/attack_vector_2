<!DOCTYPE html>
<html>
<head>
    <title>Jigsaw Shape Test - Fabric.js</title>
    <style>
        body {
            background: #1a1a2e;
            margin: 40px;
        }

        canvas {
            border: 1px solid #333;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>
<body>
<canvas id="c" width="800" height="500"></canvas>
<script>

    // --- Shape definitions ---
    // Each shape returns [along, perpendicular] points in canonical form:
    //   along         = pixels along the edge from start corner
    //   perpendicular = pixels outward from the piece (positive = away from center)

    const shapes = {
        trapezoid: (size, tab, chamfer) => [
            [size * 0.4, 0],
            [size * 0.31, tab - chamfer],
            [size * 0.3 + chamfer, tab],
            [size * 0.7 - chamfer, tab],
            [size * 0.69, tab - chamfer],
            [size * 0.6, 0],
        ],
        parapet: (size, tab, chamfer) => [
            [size * 0.385, 0],
            [size * 0.35, tab * 0.3],
            [size * 0.35, tab - chamfer],
            [size * 0.35 + chamfer, tab],
            [size * 0.45, tab],
            [size * 0.45, tab * 0.5],
            [size * 0.55, tab * 0.5],
            [size * 0.55, tab],
            [size * 0.65 - chamfer, tab],
            [size * 0.65, tab - chamfer],
            [size * 0.65, tab * 0.3],
            [size * 0.615, 0],
        ],
        saw: (size, tab, _chamfer) => [
            [size * 0.365, 0],
            [size * 0.35, tab * 0.5],
            [size * 0.38, tab],
            [size * 0.42, tab],
            [size * 0.45, tab * 0.5],
            [size * 0.50, tab],
            [size * 0.55, tab * 0.5],
            [size * 0.58, tab],
            [size * 0.62, tab],
            [size * 0.65, tab * 0.5],
            [size * 0.635, 0],
        ],
        triangle: (size, tab, _chamfer) => [
            [size * 0.35, 0],
            [size * 0.32, tab * 0.3],
            [size * 0.45, tab],
            [size * 0.55, tab],
            [size * 0.68, tab * 0.3],
            [size * 0.65, 0],
        ],
    };

    // --- Edge mappers ---
    // Map canonical (along, perpendicular) to canvas (x, y).
    // Positive perpendicular points outward from the piece center.

    function getEdgeMapper(edge, originX, originY, size) {
        switch (edge) {
            case 'top':
                return (along, perpendicular) => [originX + along, originY - perpendicular];
            case 'right':
                return (along, perpendicular) => [originX + size + perpendicular, originY + along];
            case 'bottom':
                return (along, perpendicular) => [originX + size - along, originY + size + perpendicular];
            case 'left':
                return (along, perpendicular) => [originX - perpendicular, originY + size - along];
        }
    }

    // --- Path builder ---

    function buildPiecePath(originX, originY, size, config) {
        const tab = size * 0.2;
        const chamfer = tab * 0.15;
        let path = `M ${originX} ${originY}`;

        for (const edge of ['top', 'right', 'bottom', 'left']) {
            const side = config[edge];
            const map = getEdgeMapper(edge, originX, originY, size);

            if (!side || side.direction === 'flat') {
                const [endX, endY] = map(size, 0);
                path += ` L ${endX} ${endY}`;
            } else {
                const directionSign = side.direction === 'out' ? 1 : -1;
                const points = shapes[side.shape](size, tab, chamfer);
                for (const [along, perpendicular] of points) {
                    const [x, y] = map(along, perpendicular * directionSign);
                    path += ` L ${x} ${y}`;
                }
                const [endX, endY] = map(size, 0);
                path += ` L ${endX} ${endY}`;
            }
        }

        path += ' Z';
        return path;
    }

    // --- Image-pattern piece factory ---

    function createPiecePatternCanvas(sourceImage, column, row, puzzleColumns, puzzleRows, size, config) {
        const tab = size * 0.2;
        const extensionLeft = (config.left && config.left.direction === 'out') ? tab : 0;
        const extensionTop = (config.top && config.top.direction === 'out') ? tab : 0;
        const extensionRight = (config.right && config.right.direction === 'out') ? tab : 0;
        const extensionBottom = (config.bottom && config.bottom.direction === 'out') ? tab : 0;

        const boundingBoxWidth = extensionLeft + size + extensionRight;
        const boundingBoxHeight = extensionTop + size + extensionBottom;

        const puzzleWidth = size * puzzleColumns;
        const puzzleHeight = size * puzzleRows;
        const imageScaleX = sourceImage.width / puzzleWidth;
        const imageScaleY = sourceImage.height / puzzleHeight;

        const sourceX = (column * size - extensionLeft) * imageScaleX;
        const sourceY = (row * size - extensionTop) * imageScaleY;
        const sourceWidth = boundingBoxWidth * imageScaleX;
        const sourceHeight = boundingBoxHeight * imageScaleY;

        const patternCanvas = document.createElement('canvas');
        patternCanvas.width = boundingBoxWidth;
        patternCanvas.height = boundingBoxHeight;
        const ctx = patternCanvas.getContext('2d');
        ctx.drawImage(sourceImage, sourceX, sourceY, sourceWidth, sourceHeight, 0, 0, boundingBoxWidth, boundingBoxHeight);
        return patternCanvas;
    }

    function createPiece(sourceImage, column, row, puzzleColumns, puzzleRows, size, config, canvasX, canvasY) {
        const patternCanvas = createPiecePatternCanvas(sourceImage, column, row, puzzleColumns, puzzleRows, size, config);
        const pathString = buildPiecePath(canvasX, canvasY, size, config);

        return new fabric.Path(pathString, {
            fill: new fabric.Pattern({
                source: patternCanvas,
                repeat: 'no-repeat',
            }),
            stroke: '#88aacc',
            strokeWidth: 2,
        });
    }

    // --- Render ---

    const FLAT = {direction: 'flat'};

    const image = new Image();
    image.src = '../../../../../public/img/frontier/ice/jigsaw/tylijura-ai-generated-9396797_1920.png';
    image.onload = function () {
        const fabricCanvas = new fabric.Canvas('c');
        const size = 150;

        const puzzleColumns = 2;
        const puzzleRows = 2;
        const puzzleX = 80;
        const puzzleY = 80;

        //  Piece layout (2x2 grid, flat outer edges):
        //
        //  (0,0) ←trapezoid→ (1,0)
        //    ↕                  ↕
        //   saw              triangle
        //    ↕                  ↕
        //  (0,1) ←parapet→   (1,1)

        const pieces = [
            {
                column: 0, row: 0,
                config: {
                    top: FLAT,
                    right: {shape: 'trapezoid', direction: 'out'},
                    bottom: {shape: 'saw', direction: 'out'},
                    left: FLAT,
                },
            },
            {
                column: 1, row: 0,
                config: {
                    top: FLAT,
                    right: FLAT,
                    bottom: {shape: 'triangle', direction: 'out'},
                    left: {shape: 'trapezoid', direction: 'in'},
                },
            },
            {
                column: 0, row: 1,
                config: {
                    top: {shape: 'saw', direction: 'in'},
                    right: {shape: 'parapet', direction: 'out'},
                    bottom: FLAT,
                    left: FLAT,
                },
            },
            {
                column: 1, row: 1,
                config: {
                    top: {shape: 'triangle', direction: 'in'},
                    right: FLAT,
                    bottom: FLAT,
                    left: {shape: 'parapet', direction: 'in'},
                },
            },
        ];

        pieces.forEach(pieceData => {
            const canvasX = puzzleX + pieceData.column * size;
            const canvasY = puzzleY + pieceData.row * size;
            const piece = createPiece(image, pieceData.column, pieceData.row, puzzleColumns, puzzleRows, size, pieceData.config, canvasX, canvasY);
            fabricCanvas.add(piece);
        });

        fabricCanvas.renderAll();
    };

</script>
</body>
</html>
