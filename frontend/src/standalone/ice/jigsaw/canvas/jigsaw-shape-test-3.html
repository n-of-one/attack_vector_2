<!DOCTYPE html>
<html>
<head>
    <title>Jigsaw Shape Test</title>
    <style>
        body {
            background: #1a1a2e;
            margin: 40px;
        }

        canvas {
            border: 1px solid #333;
        }
    </style>
</head>
<body>
<canvas id="c" width="800" height="400"></canvas>
<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const size = 150;
    const tab = size * 0.08; // shorter extension from the edge
    const offset = tab + 20; // offset so tabs have room

    ctx.translate(80, 80);

    ctx.beginPath();
    const margin = size * 0.1; // 10% flat at each end of every edge
    const inner = size - 2 * margin; // 80% for the pattern

    // --- Top edge: invected (consecutive bulbs, no gaps) ---
    const bulbCount = 5;
    const bulbRadius = inner / (bulbCount * 2);

    ctx.moveTo(offset, offset);
    ctx.lineTo(offset + margin, offset); // 10% flat start
    for (let i = 0; i < bulbCount; i++) {
        const bulbCenterX = offset + margin + bulbRadius * (2 * i + 1);
        ctx.arc(bulbCenterX, offset, bulbRadius, Math.PI, 0, false);
    }
    ctx.lineTo(offset + size - margin, offset);
    ctx.lineTo(offset + size, offset); // 10% flat end

    // --- Right edge: embattled (square battlements) ---
    // Starts and ends with an extrusion (merlon)
    const merlonCount = 4;
    const merlonUnit = inner / (merlonCount * 2 - 1); // 4 merlons + 3 gaps

    ctx.lineTo(offset + size, offset + margin); // 10% flat start
    ctx.lineTo(offset + size + tab, offset + margin); // step out for first merlon
    for (let i = 0; i < merlonCount; i++) {
        const merlonEnd = offset + margin + (2 * i + 1) * merlonUnit;
        ctx.lineTo(offset + size + tab, merlonEnd); // merlon bottom edge
        if (i < merlonCount - 1) {
            ctx.lineTo(offset + size, merlonEnd); // step in for gap
            const gapEnd = offset + margin + (2 * i + 2) * merlonUnit;
            ctx.lineTo(offset + size, gapEnd); // gap bottom edge
            ctx.lineTo(offset + size + tab, gapEnd); // step out for next merlon
        }
    }
    ctx.lineTo(offset + size, offset + size - margin); // step in, 10% flat end
    ctx.lineTo(offset + size, offset + size);

    // --- Bottom edge: indented (zigzag / wavy triangles) ---
    const toothCount = 6;
    const toothWidth = inner / toothCount;

    ctx.lineTo(offset + size - margin, offset + size); // 10% flat start
    for (let i = 0; i < toothCount; i++) {
        const x1 = offset + size - margin - i * toothWidth;
        const x2 = offset + size - margin - (i + 0.5) * toothWidth;
        const x3 = offset + size - margin - (i + 1) * toothWidth;
        ctx.lineTo(x1, offset + size);
        ctx.lineTo(x2, offset + size + tab);
        ctx.lineTo(x3, offset + size);
    }
    ctx.lineTo(offset + margin, offset + size);
    ctx.lineTo(offset, offset + size); // 10% flat end

    // --- Left edge: raguly (diagonal branch stumps) ---
    // Like embattled but with diagonal transitions; stumps = gaps in size
    const ragulyCount = 4;
    const ragulyUnit = inner / (ragulyCount * 2 - 1); // 4 stumps + 3 gaps = 7 units
    const ragulySlant = ragulyUnit * 0.3; // diagonal offset, split evenly between stump and gap

    ctx.lineTo(offset, offset + size - margin); // 10% flat start
    ctx.lineTo(offset - tab, offset + size - margin); // perpendicular step out
    for (let i = 0; i < ragulyCount; i++) {
        const stumpBottom = offset + size - margin - 2 * i * ragulyUnit;
        const stumpTop = stumpBottom - ragulyUnit;
        // stump body at offset-tab (shortened by half-slant at each end)
        ctx.lineTo(offset - tab, stumpTop + ragulySlant / 2);
        if (i < ragulyCount - 1) {
            // diagonal step in (eats ragulySlant/2 from stump top + ragulySlant/2 from gap bottom)
            ctx.lineTo(offset, stumpTop - ragulySlant / 2);
            const gapTop = stumpTop - ragulyUnit;
            // gap body at offset (shortened by half-slant at each end)
            ctx.lineTo(offset, gapTop + ragulySlant / 2);
            // diagonal step out (eats ragulySlant/2 from gap top + ragulySlant/2 from next stump bottom)
            ctx.lineTo(offset - tab, gapTop - ragulySlant / 2);
        }
    }
    ctx.lineTo(offset - tab, offset + margin); // last stump to top
    ctx.lineTo(offset, offset + margin); // perpendicular step in

    ctx.closePath();

    ctx.fillStyle = '#446688';
    ctx.fill();
    ctx.strokeStyle = '#88aacc';
    ctx.lineWidth = 2;
    ctx.stroke();

    // === Second piece: inverse (indentations where first has extrusions) ===
    ctx.save();
    ctx.translate(size + 80, 0);

    ctx.beginPath();

    // --- Top edge: invected inward (consecutive dips) ---
    ctx.moveTo(offset, offset);
    ctx.lineTo(offset + margin, offset);
    for (let i = 0; i < bulbCount; i++) {
        const bulbCenterX = offset + margin + bulbRadius * (2 * i + 1);
        ctx.arc(bulbCenterX, offset, bulbRadius, Math.PI, 0, true); // true = inward (down)
    }
    ctx.lineTo(offset + size - margin, offset);
    ctx.lineTo(offset + size, offset);

    // --- Right edge: embattled inward (indentations) ---
    ctx.lineTo(offset + size, offset + margin);
    ctx.lineTo(offset + size - tab, offset + margin); // step in for first indentation
    for (let i = 0; i < merlonCount; i++) {
        const merlonEnd = offset + margin + (2 * i + 1) * merlonUnit;
        ctx.lineTo(offset + size - tab, merlonEnd);
        if (i < merlonCount - 1) {
            ctx.lineTo(offset + size, merlonEnd); // step out for gap
            const gapEnd = offset + margin + (2 * i + 2) * merlonUnit;
            ctx.lineTo(offset + size, gapEnd);
            ctx.lineTo(offset + size - tab, gapEnd); // step in for next indentation
        }
    }
    ctx.lineTo(offset + size, offset + size - margin);
    ctx.lineTo(offset + size, offset + size);

    // --- Bottom edge: indented inward (zigzag pointing up) ---
    ctx.lineTo(offset + size - margin, offset + size);
    for (let i = 0; i < toothCount; i++) {
        const x1 = offset + size - margin - i * toothWidth;
        const x2 = offset + size - margin - (i + 0.5) * toothWidth;
        const x3 = offset + size - margin - (i + 1) * toothWidth;
        ctx.lineTo(x1, offset + size);
        ctx.lineTo(x2, offset + size - tab); // inward (up)
        ctx.lineTo(x3, offset + size);
    }
    ctx.lineTo(offset + margin, offset + size);
    ctx.lineTo(offset, offset + size);

    // --- Left edge: raguly inward (diagonal indentations) ---
    ctx.lineTo(offset, offset + size - margin);
    ctx.lineTo(offset + tab, offset + size - margin); // perpendicular step in
    for (let i = 0; i < ragulyCount; i++) {
        const stumpBottom = offset + size - margin - 2 * i * ragulyUnit;
        const stumpTop = stumpBottom - ragulyUnit;
        ctx.lineTo(offset + tab, stumpTop + ragulySlant / 2);
        if (i < ragulyCount - 1) {
            ctx.lineTo(offset, stumpTop - ragulySlant / 2);
            const gapTop = stumpTop - ragulyUnit;
            ctx.lineTo(offset, gapTop + ragulySlant / 2);
            ctx.lineTo(offset + tab, gapTop - ragulySlant / 2);
        }
    }
    ctx.lineTo(offset + tab, offset + margin);
    ctx.lineTo(offset, offset + margin);

    ctx.closePath();

    ctx.fillStyle = '#446688';
    ctx.fill();
    ctx.strokeStyle = '#88aacc';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.restore();
</script>
</body>
</html>
