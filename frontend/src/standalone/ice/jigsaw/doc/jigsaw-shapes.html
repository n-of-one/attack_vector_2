<!DOCTYPE html>
<html>
<head>
    <title>Jigsaw Shape Test</title>
    <style>
        body {
            background: #1a1a2e;
            margin: 40px;
        }

        canvas {
            border: 1px solid #333;
        }
    </style>
</head>
<body>
<canvas id="c" width="800" height="400"></canvas>
<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const size = 150;
    const tab = size * 0.08; // shorter extension from the edge
    const o = tab + 20; // offset so tabs have room

    ctx.translate(80, 80);

    ctx.beginPath();
    const margin = size * 0.15; // 15% flat at each end of every edge
    const inner = size - 2 * margin; // 70% for the pattern

    // --- Top edge: invected (consecutive bulbs, no gaps) ---
    const bulbCount = 4;
    const bulbRadius = inner / (bulbCount * 2);

    ctx.moveTo(o, o);
    ctx.lineTo(o + margin, o); // 10% flat start
    for (let i = 0; i < bulbCount; i++) {
        const bx = o + margin + bulbRadius * (2 * i + 1);
        ctx.arc(bx, o, bulbRadius, Math.PI, 0, false);
    }
    ctx.lineTo(o + size - margin, o);
    ctx.lineTo(o + size, o); // 10% flat end

    // --- Right edge: embattled (square battlements) ---
    // Starts and ends with an extrusion (merlon)
    const merlonCount = 3;
    const merlonUnit = inner / (merlonCount * 2 - 1); // 4 merlons + 3 gaps

    ctx.lineTo(o + size, o + margin); // 10% flat start
    ctx.lineTo(o + size + tab, o + margin); // step out for first merlon
    for (let i = 0; i < merlonCount; i++) {
        const mEnd = o + margin + (2 * i + 1) * merlonUnit;
        ctx.lineTo(o + size + tab, mEnd); // merlon bottom edge
        if (i < merlonCount - 1) {
            ctx.lineTo(o + size, mEnd); // step in for gap
            const gEnd = o + margin + (2 * i + 2) * merlonUnit;
            ctx.lineTo(o + size, gEnd); // gap bottom edge
            ctx.lineTo(o + size + tab, gEnd); // step out for next merlon
        }
    }
    ctx.lineTo(o + size, o + size - margin); // step in, 10% flat end
    ctx.lineTo(o + size, o + size);

    // --- Bottom edge: indented (zigzag / wavy triangles) ---
    const toothCount = 5;
    const toothWidth = inner / toothCount;

    ctx.lineTo(o + size - margin, o + size); // 10% flat start
    for (let i = 0; i < toothCount; i++) {
        const x1 = o + size - margin - i * toothWidth;
        const x2 = o + size - margin - (i + 0.5) * toothWidth;
        const x3 = o + size - margin - (i + 1) * toothWidth;
        ctx.lineTo(x1, o + size);
        ctx.lineTo(x2, o + size + tab);
        ctx.lineTo(x3, o + size);
    }
    ctx.lineTo(o + margin, o + size);
    ctx.lineTo(o, o + size); // 10% flat end

    // --- Left edge: raguly (diagonal branch stumps) ---
    // Like embattled but with diagonal transitions; stumps = gaps in size
    const ragCount = 4;
    const ragUnit = inner / (ragCount * 2 - 1); // 4 stumps + 3 gaps = 7 units
    const ragSlant = ragUnit * 0.3; // diagonal offset, split evenly between stump and gap

    ctx.lineTo(o, o + size - margin); // 10% flat start
    ctx.lineTo(o - tab, o + size - margin); // perpendicular step out
    for (let i = 0; i < ragCount; i++) {
        const stumpBot = o + size - margin - 2 * i * ragUnit;
        const stumpTop = stumpBot - ragUnit;
        // stump body at o-tab (shortened by half-slant at each end)
        ctx.lineTo(o - tab, stumpTop + ragSlant / 2);
        if (i < ragCount - 1) {
            // diagonal step in (eats ragSlant/2 from stump top + ragSlant/2 from gap bottom)
            ctx.lineTo(o, stumpTop - ragSlant / 2);
            const gapTop = stumpTop - ragUnit;
            // gap body at o (shortened by half-slant at each end)
            ctx.lineTo(o, gapTop + ragSlant / 2);
            // diagonal step out (eats ragSlant/2 from gap top + ragSlant/2 from next stump bottom)
            ctx.lineTo(o - tab, gapTop - ragSlant / 2);
        }
    }
    ctx.lineTo(o - tab, o + margin); // last stump to top
    ctx.lineTo(o, o + margin); // perpendicular step in

    ctx.closePath();

    ctx.fillStyle = '#446688';
    ctx.fill();
    ctx.strokeStyle = '#88aacc';
    ctx.lineWidth = 2;
    ctx.stroke();

    // === Second piece: inverse (indentations where first has extrusions) ===
    ctx.save();
    ctx.translate(size + 80, 0);

    ctx.beginPath();

    // --- Top edge: invected inward (consecutive dips) ---
    ctx.moveTo(o, o);
    ctx.lineTo(o + margin, o);
    for (let i = 0; i < bulbCount; i++) {
        const bx = o + margin + bulbRadius * (2 * i + 1);
        ctx.arc(bx, o, bulbRadius, Math.PI, 0, true); // true = inward (down)
    }
    ctx.lineTo(o + size - margin, o);
    ctx.lineTo(o + size, o);

    // --- Right edge: embattled inward (indentations) ---
    ctx.lineTo(o + size, o + margin);
    ctx.lineTo(o + size - tab, o + margin); // step in for first indentation
    for (let i = 0; i < merlonCount; i++) {
        const mEnd = o + margin + (2 * i + 1) * merlonUnit;
        ctx.lineTo(o + size - tab, mEnd);
        if (i < merlonCount - 1) {
            ctx.lineTo(o + size, mEnd); // step out for gap
            const gEnd = o + margin + (2 * i + 2) * merlonUnit;
            ctx.lineTo(o + size, gEnd);
            ctx.lineTo(o + size - tab, gEnd); // step in for next indentation
        }
    }
    ctx.lineTo(o + size, o + size - margin);
    ctx.lineTo(o + size, o + size);

    // --- Bottom edge: indented inward (zigzag pointing up) ---
    ctx.lineTo(o + size - margin, o + size);
    for (let i = 0; i < toothCount; i++) {
        const x1 = o + size - margin - i * toothWidth;
        const x2 = o + size - margin - (i + 0.5) * toothWidth;
        const x3 = o + size - margin - (i + 1) * toothWidth;
        ctx.lineTo(x1, o + size);
        ctx.lineTo(x2, o + size - tab); // inward (up)
        ctx.lineTo(x3, o + size);
    }
    ctx.lineTo(o + margin, o + size);
    ctx.lineTo(o, o + size);

    // --- Left edge: raguly inward (diagonal indentations) ---
    ctx.lineTo(o, o + size - margin);
    ctx.lineTo(o + tab, o + size - margin); // perpendicular step in
    for (let i = 0; i < ragCount; i++) {
        const stumpBot = o + size - margin - 2 * i * ragUnit;
        const stumpTop = stumpBot - ragUnit;
        ctx.lineTo(o + tab, stumpTop + ragSlant / 2);
        if (i < ragCount - 1) {
            ctx.lineTo(o, stumpTop - ragSlant / 2);
            const gapTop = stumpTop - ragUnit;
            ctx.lineTo(o, gapTop + ragSlant / 2);
            ctx.lineTo(o + tab, gapTop - ragSlant / 2);
        }
    }
    ctx.lineTo(o + tab, o + margin);
    ctx.lineTo(o, o + margin);

    ctx.closePath();

    ctx.fillStyle = '#446688';
    ctx.fill();
    ctx.strokeStyle = '#88aacc';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.restore();
</script>
</body>
</html>
