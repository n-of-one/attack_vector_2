services:
  # traefik config base on https://joeeey.com/blog/selfhosting-sso-with-traefik-keycloak-part-1/

  traefik:
    image: traefik:3.7.1
    ports:
      - '80:80'
      - '443:443'
    env_file:
      - ".env"
      - "letsencrypt.env"
    volumes:
      - ./conf/traefik/traefik.yml:/traefik.yml
      - ./conf/traefik/conf.d:/conf.d
      - /var/run/docker.sock:/var/run/docker.sock
      - traefik-certificates:/etc/traefik/letsencrypt
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.route-reverseproxy.rule=Host(`${TRAEFIK_HOST}`)"
      - "traefik.http.routers.route-reverseproxy.service=api@internal"
    restart: unless-stopped

  keycloak:
    # internal: keycloak on port 8080
    image: quay.io/keycloak/keycloak:26.6
    command: start --import-realm
    environment:
      JAVA_OPTS_APPEND: "-Dkeycloak.migration.strategy=IGNORE_EXISTING"

      KC_HOSTNAME: ${KEYCLOAK_HOST}

      KC_PROXY: 'edge'
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db/${KEYCLOAK_DB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}

      KC_HTTP_ENABLED: true
      KC_HEALTH_ENABLED: true
      KC_PROXY_HEADERS: xforwarded
      PROXY_ADDRESS_FORWARDING: 'true'

      KC_HOSTNAME_STRICT: false
    healthcheck:
      test: [ "CMD-SHELL", " exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | tee /tmp/healthcheck.log | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 240s
    volumes:
      - ./conf/keycloak/:/opt/keycloak/data/import/
      - ./data/keycloak:/opt/keycloak/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.route-auth.rule=Host(`${KEYCLOAK_HOST}`)"
      - "traefik.http.services.route-auth.loadbalancer.server.port=8080"
    restart: unless-stopped
    depends_on:
      - keycloak-db
      - traefik



# https://medium.com/@disa2aka/docker-deployments-for-keycloak-and-postgresql-e75707b155e5

  keycloak-db:
    container_name: keycloak-db
    image: postgres:16.2
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "${KEYCLOAK_DB}", "-U", "${KEYCLOAK_DB_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    restart: unless-stopped

  attack_vector_2-DB:
    extends:
      file: ../../compose.yaml
      service: attack_vector_2-DB

  attack_vector_2:
    container_name: ${ATTACK_VECTOR_HOST}
    extends:
      file: ../../compose.yaml
      service: attack_vector_2
    ports: !reset []
    depends_on:
      keycloak:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.route-hack.rule=Host(`${ATTACK_VECTOR_HOST}`)"
    links:
      - traefik:${KEYCLOAK_HOST}

volumes:
  postgres_data:
    driver: local
  mongo_data:
  traefik-certificates: